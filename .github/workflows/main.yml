name: Wake up Apps
on:
  schedule:
    - cron: '0 7,12,18 * * *' # Un peu plus souvent pour la journée de demain !
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          
      - name: Wake up apps with Playwright
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          urls = ['https://solaridehorizon.streamlit.app/', 'https://creusecineplus.streamlit.app/']
          with sync_playwright() as p:
              browser = p.chromium.launch()
              for url in urls:
                  page = browser.new_page()
                  print(f'Opening {url}...')
                  page.goto(url, wait_until='networkidle')
                  page.wait_for_timeout(5000) # On attend 5 sec que ça charge
                  print(f'Done for {url}')
              browser.close()
          "
