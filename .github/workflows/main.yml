name: Wake up Apps

on:
  schedule:
    - cron: '0 8,20 * * *' # Tourne à 8h et 20h pour être sûre
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send requests
        run: |
          curl -L --user-agent "Mozilla/5.0" https://solaridehorizon.streamlit.app/
          curl -L --user-agent "Mozilla/5.0" https://creusecineplus.streamlit.app/
